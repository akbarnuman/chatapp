version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: chatapp_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: chatapp

  backend:
    build: ./backend
    container_name: chatapp_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/chatapp
      - JWT_SECRET=change_this_in_production
      - JWT_EXPIRE=7d
      - CLIENT_URL=http://localhost:3000
      - NODE_ENV=production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: chatapp_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - REACT_APP_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads_data:
